<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f8fb;
            color: #222;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 50px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 750px;
        }

        h1 {
            font-size: 42px;
            color: #0b5ed7;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 28px;
            background: #0b5ed7;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="card">
            <h1>AI Resume Analyzer</h1>
            <p>
                Upload your resume, analyze your skills, check ATS compatibility,
                and get smart suggestions to improve your chances of getting shortlisted.
            </p>
            <a href="{% url 'upload_resume' %}" class="btn">Upload Resume</a>
        </div>
    </div>

</body>
</html>
